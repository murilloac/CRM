name: CRM Docker CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validar docker compose
        run: docker compose config

      - name: Build backend
        run: docker build -t crm-backend ./backend

      - name: Build frontend
        run: docker build -t crm-frontend -f Dockerfile .

      - name: Subir containers para teste
        run: docker compose up -d --build

      - name: Verificar containers ativos
        run: docker compose ps

      - name: Exibir logs backend
        run: docker compose logs backend

      - name: Exibir logs frontend
        run: docker compose logs frontend

      - name: Derrubar containers
        if: always()
        run: docker compose down
