name: Provisionando EC2 e Deploy CRM do meu GIT na AWS

on:
  workflow_dispatch:

jobs:
  provision-ec2:
    name: Criar EC2 automaticamente
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.launch.outputs.instance_id }}
      public_ip: ${{ steps.get_ip.outputs.public_ip }}
      security_group_id: ${{ steps.sg.outputs.security_group_id }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Obter VPC padrão
        id: vpc
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query "Vpcs[0].VpcId" \
            --output text)
          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT

      - name: Obter Subnet padrão
        id: subnet
        run: |
          SUBNET_ID=$(aws ec2 describe-subnets \
            --filters Name=vpc-id,Values=${{ steps.vpc.outputs.vpc_id }} Name=default-for-az,Values=true \
            --query "Subnets[0].SubnetId" \
            --output text)
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT

      - name: Criar Security Group
        id: sg
        run: |
          SG_ID=$(aws ec2 create-security-group \
            --group-name crm-sg-${{ github.run_id }} \
            --description "Security Group CRM Auto Deploy" \
            --vpc-id ${{ steps.vpc.outputs.vpc_id }} \
            --query "GroupId" \
            --output text)

          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 22 --cidr 0.0.0.0/0
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 8888 --cidr 0.0.0.0/0
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 3003 --cidr 0.0.0.0/0

          echo "security_group_id=$SG_ID" >> $GITHUB_OUTPUT

      - name: Obter AMI Amazon Linux 2023
        id: ami
        run: |
          AMI_ID=$(aws ssm get-parameter \
            --name /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64 \
            --query "Parameter.Value" \
            --output text)
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT

      - name: Criar instância EC2
        id: launch
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ steps.ami.outputs.ami_id }} \
            --instance-type t3.micro \
            --key-name ${{ secrets.AWS_KEY_PAIR_NAME }} \
            --security-group-ids ${{ steps.sg.outputs.security_group_id }} \
            --subnet-id ${{ steps.subnet.outputs.subnet_id }} \
            --associate-public-ip-address \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=crm-auto-deploy}]' \
            --query "Instances[0].InstanceId" \
            --output text)

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Aguardar instância iniciar
        run: |
          aws ec2 wait instance-running --instance-ids ${{ steps.launch.outputs.instance_id }}

      - name: Obter IP público da instância
        id: get_ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ steps.launch.outputs.instance_id }} \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)

          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "IP público da EC2: $PUBLIC_IP"

      - name: Aguardar SSH ficar disponível
        run: |
          echo "Aguardando SSH..."
          for i in {1..30}; do
            nc -zv ${{ steps.get_ip.outputs.public_ip }} 22 && echo "SSH disponível!" && exit 0
            echo "Tentativa $i/30 - aguardando 10s..."
            sleep 10
          done
          echo "SSH não ficou disponível a tempo."
          exit 1

  deploy:
    name: Instalar e subir aplicação na EC2
    runs-on: ubuntu-latest
    needs: provision-ec2

    steps:
      - name: Deploy via SSH na EC2 criada
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.provision-ec2.outputs.public_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e

            sudo dnf update -y
            sudo dnf install -y docker git

            sudo systemctl start docker
            sudo systemctl enable docker

            sudo usermod -aG docker ec2-user

            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.39.1/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            cd /home/ec2-user

            if [ ! -d "CRM" ]; then
              git clone ${{ secrets.REPO_URL }} CRM
            fi

            cd CRM

            git pull origin main || true

            mkdir -p frontend

            cat > frontend/credentials.js <<EOF
            const credentials = {
              admin: '${{ secrets.FRONTEND_ADMIN_PASSWORD }}',
            }
            EOF

            cat > frontend/config.js <<EOF
            const API_CONFIG = {
              baseURL: 'http://${{ needs.provision-ec2.outputs.public_ip }}:3003',
            }
            EOF

            touch backend/crm.db
            chmod 666 backend/crm.db

            sudo docker compose down || true
            sudo docker compose up -d --build

            sudo docker compose ps

            echo "Aplicação disponível em:"
            echo "http://${{ needs.provision-ec2.outputs.public_ip }}:8888"
            echo "Backend em:"
            echo "http://${{ needs.provision-ec2.outputs.public_ip }}:3003"
