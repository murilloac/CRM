<!DOCTYPE html>
<html>
<head>
    <title>Teste API</title>
</head>
<body>
    <h1>Teste da API</h1>
    <button onclick="testarAPI()">Testar Chamados</button>
    <div id="resultado"></div>

    <script>
        async function testarAPI() {
            try {
                const res = await fetch("http://host67.expnac.local:5000/chamados");
                const chamados = await res.json();
                
                console.log('Todos os chamados:', chamados);
                
                const cancelados = chamados.filter(c => c.status === 'cancelado');
                console.log('Chamados cancelados:', cancelados);
                
                document.getElementById('resultado').innerHTML = `
                    <h3>Total de chamados: ${chamados.length}</h3>
                    <h3>Chamados cancelados: ${cancelados.length}</h3>
                    <pre>${JSON.stringify(chamados, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('resultado').innerHTML = 'Erro: ' + error.message;
            }
        }
    </script>
</body>
</html>
