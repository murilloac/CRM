<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste Dashboard - CRM</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Teste de Conectividade - Dashboard CRM</h1>
    <div id="results"></div>
    
    <script>
        async function testarConectividade() {
            const results = document.getElementById('results');
            
            try {
                results.innerHTML += '<div class="test-result info">🔄 Testando conexão com backend...</div>';
                
                const response = await fetch('http://host67.expnac.local:5000/chamados');
                
                if (response.ok) {
                    const dados = await response.json();
                    results.innerHTML += `<div class="test-result success">✅ Conexão OK! ${dados.length} chamados encontrados</div>`;
                    
                    // Testa cálculo de tempo médio
                    const finalizados = dados.filter(c => c.status === 'finalizado');
                    results.innerHTML += `<div class="test-result info">📊 Chamados finalizados: ${finalizados.length}</div>`;
                    
                    if (finalizados.length > 0) {
                        let tempoMedio = 0;
                        let contadorValidos = 0;
                        
                        finalizados.forEach(c => {
                            if (c.created_at) {
                                const criado = new Date(c.created_at);
                                const finalizado = c.finished_at ? new Date(c.finished_at) : new Date();
                                const horas = (finalizado - criado) / (1000 * 60 * 60);
                                
                                if (horas > 0) {
                                    tempoMedio += horas;
                                    contadorValidos++;
                                    results.innerHTML += `<div class="test-result info">⏱️ Chamado #${c.id}: ${horas.toFixed(1)}h</div>`;
                                }
                            }
                        });
                        
                        if (contadorValidos > 0) {
                            tempoMedio = Math.round(tempoMedio / contadorValidos);
                            results.innerHTML += `<div class="test-result success">📈 Tempo médio calculado: ${tempoMedio}h</div>`;
                        } else {
                            results.innerHTML += '<div class="test-result error">❌ Nenhum chamado válido para cálculo</div>';
                        }
                    } else {
                        results.innerHTML += '<div class="test-result info">ℹ️ Nenhum chamado finalizado para calcular tempo médio</div>';
                    }
                    
                } else {
                    results.innerHTML += `<div class="test-result error">❌ Erro HTTP: ${response.status}</div>`;
                }
                
            } catch (error) {
                results.innerHTML += `<div class="test-result error">❌ Erro de conexão: ${error.message}</div>`;
            }
        }
        
        // Executa teste ao carregar
        testarConectividade();
    </script>
</body>
</html>
